<!DOCTYPE html>
<html>
<head>
    <title>Storage Test</title>
</head>
<body>
    <input type="file" id="photoInput" accept="image/*">
    <button onclick="upload()">Hochladen</button>
    <div id="preview"></div>

    <!-- Firebase Imports -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

    <script>
    // Firebase Config (deine Daten)
    const firebaseConfig = {
        apiKey: "AIzaSyAemNwKerXt-hvtikIIACR4oBTb72VjL_U",
        authDomain: "usv-staw-app.firebaseapp.com",
        projectId: "usv-staw-app",
        storageBucket: "usv-staw-app.firebasestorage.app",
        messagingSenderId: "983106867178",
        appId: "1:983106867178:web:90234121a5833e7e396c93"
    };

    // Firebase initialisieren
    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();
    console.log("✅ Firebase bereit");

    async function upload() {
        const file = document.getElementById('photoInput').files[0];
        if (!file) {
            alert("Bitte Datei auswählen!");
            return;
        }

        try {
            console.log("📤 Lade hoch:", file.name);
            
            // In Storage hochladen
            const storageRef = storage.ref();
            const imageRef = storageRef.child('test/' + Date.now() + '.jpg');
            
            await imageRef.put(file);
            
            // URL holen
            const url = await imageRef.getDownloadURL();
            
            console.log("✅ Erfolg! URL:", url);
            document.getElementById('preview').innerHTML = `<img src="${url}" width="200">`;
            
        } catch (error) {
            console.error("❌ Fehler:", error);
            alert("Fehler: " + error.message);
        }
    }
    </script>
</body>
</html>
