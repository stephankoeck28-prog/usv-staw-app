  `;
}

function renderTrainingHistory() {
  const trainings = [...(state.trainings || [])].sort((a,b) => b.date.localeCompare(a.date));
  
  return `
    <div class="section">
      <div class="card">
        <h3>📋 Trainingsübersicht</h3>
        
        ${trainings.length > 0 ? trainings.map(t => {
          const present = state.players?.filter(p => t.attendance?.[p.id] === "present").map(p => p.name).join(', ') || '';
          const excused = state.players?.filter(p => t.attendance?.[p.id] === "excused").map(p => p.name).join(', ') || '';
          const missing = state.players?.filter(p => t.attendance?.[p.id] === "missing").map(p => p.name).join(', ') || '';
          
          return `
            <div style="margin-bottom: 16px; padding: 12px; background: #f5f9f6; border-radius: 12px;">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <div style="font-weight: 600;">📅 ${t.date}</div>
                ${session.role === "admin" ? `
                  <button class="btn danger small" onclick="deleteTraining('${t.id}')">🗑️</button>
                ` : ''}
              </div>
              ${present ? `<div style="color: #2e9b58; margin: 4px 0;">✓ Anwesend: ${present}</div>` : ''}
              ${excused ? `<div style="color: #f3a43b; margin: 4px 0;">F Entschuldigt: ${excused}</div>` : ''}
              ${missing ? `<div style="color: #d45d4a; margin: 4px 0;">✗ Unentschuldigt: ${missing}</div>` : ''}
            </div>
          `;
        }).join('') : '<p class="small">Noch keine Trainings erfasst</p>'}
      </div>
    </div>
  `;
}

function renderMatchReport() {
  if (session.role !== "admin") {
    return `
      <div class="section">
        <div class="card">
          <h3>⛔ Kein Zugriff</h3>
          <p class="small">Nur der Haupttrainer kann Spielberichte verwalten.</p>
        </div>
      </div>
    `;
  }
  
  const allMatches = [...(state.matches || [])].sort((a,b) => b.date.localeCompare(a.date));
  
  const matchesWithoutReport = allMatches.filter(m => !m.report);
  
  const matchesWithReport = allMatches.filter(m => m.report);
  
  const selectedMatch = state.selectedReportMatchId ? 
    state.matches?.find(m => m.id === state.selectedReportMatchId) : null;
  
  return `
    <div class="section">
      <div class="card">
        <h3>📝 Spielberichte verwalten</h3>
        
        <div style="margin-bottom: 24px;">
          <label>Spiel auswählen (ohne Bericht)</label>
          <select id="match-report-select" onchange="setSelectedReportMatch(this.value)">
            <option value="">Bitte auswählen...</option>
            ${matchesWithoutReport.map(m => `
              <option value="${m.id}" ${state.selectedReportMatchId === m.id ? 'selected' : ''}>
                ${m.date} - ${m.title} (${m.team})
              </option>
            `).join('')}
          </select>
        </div>
        
        ${selectedMatch ? `
          <div style="margin-bottom: 30px; padding: 20px; background: #f5f9f6; border-radius: 16px;">
            <h4 style="margin: 0 0 16px 0;">${selectedMatch.date} - ${selectedMatch.title}</h4>
            
            <label>Ergebnis (z.B. 4:4)</label>
            <input id="match-result-${selectedMatch.id}" value="${selectedMatch.result || ''}" placeholder="z.B. 4:4">
            
            <h5 style="margin: 20px 0 10px;">⚽ Torschützen</h5>
            ${getEligiblePlayersForMatch(selectedMatch).sort((a,b) => a.name.localeCompare(b.name)).map(player => `
              <div style="display: flex; gap: 10px; align-items: center; margin: 8px 0;">
                <span style="width: 140px;"><strong>${player.name}</strong></span>
                <input id="goal-${selectedMatch.id}-${player.id}" type="number" min="0" value="${selectedMatch.report?.goals?.[player.id] || 0}" style="width: 70px;">
                <span class="small">Tore</span>
              </div>
            `).join('')}
            
            <h5 style="margin: 20px 0 10px;">🎯 Assists</h5>
            ${getEligiblePlayersForMatch(selectedMatch).sort((a,b) => a.name.localeCompare(b.name)).map(player => `
              <div style="display: flex; gap: 10px; align-items: center; margin: 8px 0;">
                <span style="width: 140px;"><strong>${player.name}</strong></span>
                <input id="assist-${selectedMatch.id}-${player.id}" type="number" min="0" value="${selectedMatch.report?.assists?.[player.id] || 0}" style="width: 70px;">
                <span class="small">Assists</span>
              </div>
            `).join('')}
            
            <div style="display: flex; gap: 12px; margin-top: 24px;">
              <button class="btn primary" style="flex: 2;" onclick="saveMatchReport('${selectedMatch.id}')">
                💾 Bericht speichern
              </button>
              <button class="btn secondary" style="flex: 1;" onclick="setSelectedReportMatch(null)">
                ✗ Abbrechen
              </button>
            </div>
          </div>
        ` : ''}
        
        <h4 style="margin: 30px 0 16px 0;">📋 Erstellte Berichte</h4>
        
        ${matchesWithReport.length > 0 ? matchesWithReport.map(m => {
          const playersWithGoals = Object.entries(m.report?.goals || {}).filter(([_, count]) => count > 0);
          const playersWithAssists = Object.entries(m.report?.assists || {}).filter(([_, count]) => count > 0);
          
          return `
            <div class="match-report-item completed">
              <div class="match-report-header">
                <div class="match-report-title">${m.date} - ${m.title} (${m.team})</div>
                <div class="match-report-actions">
                  <button class="btn secondary small" onclick="setSelectedReportMatch('${m.id}')">✏️</button>
                  <button class="btn danger small" onclick="deleteMatchReport('${m.id}')">🗑️</button>
                </div>
              </div>
              <div class="match-report-result">Ergebnis: ${m.result}</div>
              <div style="margin-top: 10px;">
                ${playersWithGoals.length > 0 ? `
                  <div style="font-weight: 600; color: var(--primary);">⚽ Torschützen:</div>
                  ${playersWithGoals.map(([playerId, count]) => {
                    const player = findPlayer(playerId);
                    return `<div style="margin-left: 16px;">${player?.name}: ${count} Tor${count !== 1 ? 'e' : ''}</div>`;
                  }).join('')}
                ` : ''}
                
                ${playersWithAssists.length > 0 ? `
                  <div style="font-weight: 600; color: var(--blue); margin-top: ${playersWithGoals.length > 0 ? '8px' : '0'};">🎯 Assists:</div>
                  ${playersWithAssists.map(([playerId, count]) => {
                    const player = findPlayer(playerId);
                    return `<div style="margin-left: 16px;">${player?.name}: ${count} Assist${count !== 1 ? 's' : ''}</div>`;
                  }).join('')}
                ` : ''}
              </div>
            </div>
          `;
        }).join('') : '<p class="small">Noch keine Spielberichte erstellt</p>'}
      </div>
    </div>
  `;
}

function renderTests() {
  const players = playersForCurrentTeam();
  const today = new Date().toISOString().split('T')[0];
  
  return `
    <div class="section">
      <div class="card">
        <h3>📊 Leistungstests</h3>
        
        <div class="player-list">
          ${players.map(p => `
            <button class="${state.selectedPlayerId === p.id ? 'active' : ''}" onclick="setSelectedPlayer('${p.id}')">
              ${p.name}
            </button>
          `).join('')}
        </div>
        
        ${state.selectedPlayerId ? (() => {
          const player = findPlayer(state.selectedPlayerId);
          if (!player) return '';
          
          return `
            <div>
              <h4>${player.name}</h4>
              
              <label>Testdatum</label>
              <input id="test-date-${player.id}" type="date" value="${today}">
              
              ${(state.testConfig || []).map(t => `
                <div style="margin-top: 12px;">
                  <label>${t.name} (${t.unit}) - Ziel: ${t.target}</label>
                  <input id="test-${player.id}-${t.id}" type="number" step="0.01" placeholder="Wert eingeben">
                </div>
              `).join('')}
              
              <button class="btn primary" style="width: 100%; margin-top: 16px;" onclick="saveTestResults('${player.id}')">
                ✅ Tests speichern
              </button>
              
              ${player.tests && player.tests.length > 0 ? `
                <div style="margin-top: 20px;">
                  <h5 style="margin: 0 0 8px 0;">Alle Tests</h5>
                  ${player.tests.map((test, index) => `
                    <div style="margin-bottom: 12px; padding: 12px; background: white; border-radius: 8px; position: relative;">
                      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <div style="font-weight: 600;">📅 ${test.date}</div>
                        ${session.role === "admin" ? `
                          <button class="btn danger small" onclick="deleteSingleTest('${player.id}', ${index})">✗</button>
                        ` : ''}
                      </div>
                      ${Object.entries(test.results).map(([testId, value]) => {
                        const testConfig = state.testConfig?.find(t => t.id === testId);
                        if (!testConfig) return '';
                        const stars = calculateStars(value, testConfig);
                        return `
                          <div style="display: flex; justify-content: space-between; align-items: center; margin: 4px 0;">
                            <span>${testConfig.name}: <strong>${value} ${testConfig.unit}</strong></span>
                            <span>${getStarsHtml(stars)}</span>
                          </div>
                        `;
                      }).join('')}
                    </div>
                  `).join('')}
                </div>
              ` : ''}
            </div>
          `;
        })() : '<p class="small">Bitte Spieler auswählen</p>'}
      </div>
    </div>
  `;
}

            <div class="stat"><strong>${calculatePlayerPercentage(selectedPlayer.id)}%</strong><span class="small">Training</span></div>

          <div style="display: flex; gap: 12px; margin-top: 16px;">
            <button class="btn primary" style="flex: 2;" onclick="savePlayerData()">💾 Speichern</button>
            <button class="btn secondary" style="flex: 1;" onclick="resetParentPassword('${selectedPlayer.id}')">🔑 Eltern-PW</button>
            <button class="btn danger" style="flex: 1;" onclick="deletePlayer('${selectedPlayer.id}')">🗑️ Löschen</button>
          </div>
          
          ${lastTest ? `
            <div style="margin-top: 20px;">
              <h5>📊 Letzter Test (${lastTest.date})</h5>
              ${Object.entries(lastTest.results).map(([testId, value]) => {
                const testConfig = state.testConfig?.find(t => t.id === testId);
                if (!testConfig) return '';
                const stars = calculateStars(value, testConfig);
                return `
                  <div style="display: flex; justify-content: space-between; margin: 4px 0;">
                    <span>${testConfig.name}: <strong>${value} ${testConfig.unit}</strong></span>
                    <span>${getStarsHtml(stars)}</span>
                  </div>
                `;
              }).join('')}
            </div>
          ` : ''}
          
          ${history.length > 0 ? `
            <div style="margin-top: 20px;">
              <h5>📅 Training-History</h5>
              ${history.map(h => {
                const statusClass = h.status === 'present' ? 'history-present' : 
                                  h.status === 'excused' ? 'history-excused' : 'history-missing';
                const statusText = h.status === 'present' ? '✓ anwesend' : 
                                  h.status === 'excused' ? 'F entschuldigt' : '✗ unentschuldigt';
                return `
                  <div class="history-item ${statusClass}">
                    <span style="font-weight: 600;">${h.date}</span> - ${statusText}
                  </div>
                `;
              }).join('')}
            </div>
          ` : ''}
        </div>
      </div>
    </div>
  `;
}

function renderMilestones(player) {
  if (!player) return '<div class="section">Fehler: Kein Spieler gefunden</div>';
  
  const seasons = player.seasonHistory || {};
  
  const currentSeasonData = {
    goals: player.goals || 0,
    assists: player.assists || 0,
    trainings: player.trainingCount || 0,
    percentage: calculatePlayerPercentage(player.id)
  };
  
  function formatSeason(year) {
    const startYear = parseInt(year);
    const endYear = startYear + 1;
    return `${startYear}/${endYear}`;
  }
  
  const currentSeasonFormatted = formatSeason(state.currentSeason);
  
  const sortedSeasons = Object.keys(seasons).sort((a, b) => b - a);
  
  return `
    <div class="section">
      <div class="card">
        <h3>🏆 Meilensteine - ${player.name}</h3>
        <p class="small" style="margin-bottom: 16px; text-align: center;">Alle Saison-Statistiken auf einen Blick</p>
        
        <div class="milestone-card" style="background: linear-gradient(135deg, #e8f0fe, #d4e3ff); border-color: var(--blue);">
          <div class="milestone-year">⚡ Aktuelle Saison ${currentSeasonFormatted}</div>
          <div class="milestone-stats">
            <div class="milestone-stat">
              <div class="value">${currentSeasonData.goals}</div>
              <div class="label">⚽ Tore</div>
            </div>
            <div class="milestone-stat">
              <div class="value">${currentSeasonData.assists}</div>
              <div class="label">🎯 Assists</div>
            </div>
            <div class="milestone-stat">
              <div class="value">${currentSeasonData.percentage}%</div>
              <div class="label">🏋️ Training</div>
            </div>
          </div>
        </div>
        
        ${sortedSeasons.length > 0 ? sortedSeasons.map(year => {
          const data = seasons[year];
          const seasonFormatted = formatSeason(year);
          return `
            <div class="milestone-card">
              <div class="milestone-year">📅 Saison ${seasonFormatted}</div>
              <div class="milestone-stats">
                <div class="milestone-stat">
                  <div class="value">${data.goals}</div>
                  <div class="label">⚽ Tore</div>
                </div>
                <div class="milestone-stat">
                  <div class="value">${data.assists}</div>
                  <div class="label">🎯 Assists</div>
                </div>
                <div class="milestone-stat">
                  <div class="value">${data.percentage}%</div>
                  <div class="label">🏋️ Training</div>
                </div>
              </div>
            </div>
          `;
        }).join('') : `
          <div style="text-align: center; padding: 20px; color: var(--muted);">
            Noch keine abgeschlossenen Saisons vorhanden.
          </div>
        `}
        
        <div style="margin-top: 20px; padding: 12px; background: #f5f9f6; border-radius: 12px; font-size: 12px; text-align: center;">
          ⚡ Aktuelle Saison • 📅 Abgeschlossene Saisons (bleiben dauerhaft gespeichert)
        </div>
      </div>
    </div>
  `;
}

function setCoachView(view) {

    setTimeout(() => {
      document.getElementById('old-password')?.focus();
    }, 100);
  }
  render();

function render() {
  const app = document.getElementById('app');
  
  if (!session) {
    app.innerHTML = renderLogin();
    return;
  }
  
  let content = renderHeader();
  
  if (session.role === "parent") {
    content += renderParentView();
  } else if (session.role === "coach") {
    content += renderCoachView();
  } else {
    if (adminView === "dashboard") content += renderDashboard();
    else if (adminView === "calendar") content += renderCalendar();
    else if (adminView === "training") content += renderTraining();
    else if (adminView === "matchreport") content += renderMatchReport();
    else if (adminView === "traininghistory") content += renderTrainingHistory();
    else if (adminView === "players") content += renderPlayers();
    else if (adminView === "tests") content += renderTests();
    else if (adminView === "statistics") content += renderStatistics();
    else if (adminView === "config") content += renderConfig();
    else if (adminView === "splash") content += renderSplashConfig();
    else if (adminView === "password") content += `
      <div class="section">
        <div class="card">
          <h3>🔑 Passwort ändern</h3>
          <label>Altes Passwort</label>
          <input id="old-password" type="password">
          <label>Neues Passwort</label>
          <input id="new-password" type="password">
          <label>Passwort wiederholen</label>
          <input id="confirm-password" type="password">
          <button class="btn primary" style="width: 100%; margin-top: 16px;" onclick="changePassword()">Passwort ändern</button>
        </div>
      </div>
    `;
    else if (adminView === "trainerkind") content += renderTrainerKindView();
    else content += renderDashboard();
  }
  
  content += renderNav();
  
  app.innerHTML = content;
  
  if ((session.role === "admin" && adminView === "training") || 
      (session.role === "coach" && coachView === "training")) {
    setTodayForTraining();
  }
}

async function startApp() {
  console.log("🚀 App wird gestartet...");
  
  await loadState();
  listenState();
  render();
  
  setTimeout(() => {
    showSplashScreen();
  }, 100);
  
  const now = new Date();
  const nextCheck = new Date();
  nextCheck.setHours(8, 0, 0, 0);
  
  if (now > nextCheck) {
    nextCheck.setDate(nextCheck.getDate() + 1);
  }
  
  const timeUntilCheck = nextCheck - now;
  console.log(`⏰ Erster Erinnerungs-Check in ${Math.round(timeUntilCheck / 1000 / 60)} Minuten`);
  
  setTimeout(() => {
    checkAndSendReminders();
    setInterval(checkAndSendReminders, 24 * 60 * 60 * 1000);
  }, timeUntilCheck);
  
  setTimeout(() => {
    if (session) {
      initPushNotifications();
    }
  }, 2000);
}
