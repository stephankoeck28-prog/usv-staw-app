<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USV St Andrä Wördern - Team App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            margin: 20px;
        }

        .splash-screen {
            background: white;
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 5px;
            color: #333;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        .vereinsinfo {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .vereinsinfo p {
            margin: 10px 0;
            color: #555;
            font-size: 18px;
        }

        .vereinsinfo .highlight {
            color: #667eea;
            font-weight: bold;
            font-size: 24px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            text-align: center;
        }

        .error-message {
            background: #ff4757;
            color: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="errorDisplay" class="error-message"></div>
        
        <div id="splashScreen" class="splash-screen">
            <div class="logo">⚽</div>
            <h1>USV St Andrä Wördern</h1>
            <div class="subtitle">Team App</div>
            
            <div class="vereinsinfo">
                <p>
                    <span class="highlight">SV ST.ANDRÄ</span><br>
                    <span style="font-size: 20px;">WÖRDERN</span><br>
                    <span style="color: #999;">est. 1919</span>
                </p>
            </div>
            
            <div class="buttons">
                <button class="btn btn-primary" onclick="window.location.href='login.html'">
                    Zum Login
                </button>
                <button class="btn btn-secondary" onclick="showDemo()">
                    Demo
                </button>
            </div>
        </div>
        
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p style="margin-top: 10px; color: white;">Lade...</p>
        </div>
        
        <div class="footer">
            © Trainer Stephan Köck | Release 2026
        </div>
    </div>

    <script>
        // Splash-Screen automatisch nach 3 Sekunden verschwinden lassen (wenn keine Interaktion)
        setTimeout(function() {
            console.log('Splash-Screen bereit');
            // Hier kannst du später die eigentliche App laden
        }, 1000);

        // Demo-Funktion
        function showDemo() {
            const errorBox = document.getElementById('errorDisplay');
            errorBox.style.display = 'block';
            errorBox.innerHTML = '⚽ Demo-Modus: Trainer (trainer/trainer), Eltern (name/1234)';
            
            setTimeout(function() {
                errorBox.style.display = 'none';
            }, 3000);
        }

        // Error-Handling
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('Fehler:', msg, 'in', url, 'Zeile:', lineNo);
            const errorBox = document.getElementById('errorDisplay');
            errorBox.style.display = 'block';
            errorBox.innerHTML = '❌ Ein Fehler ist aufgetreten. Bitte Seite neu laden.';
            return false;
        };

        // Lade-Animation testen
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            setTimeout(function() {
                document.getElementById('loading').style.display = 'none';
            }, 2000);
        }

        console.log('🚀 USV St Andrä Wördern App gestartet');
    </script>
</body>
</html>
