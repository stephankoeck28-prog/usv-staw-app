async function saveIncomingPush(userId, title, body, type = 'info') {
  if (!state.pendingPushes) state.pendingPushes = [];
  state.pendingPushes.push({
    id: 'push-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5),
    userId, title, body, type,
    receivedAt: new Date().toISOString(),
    confirmed: false
  });
  await save();
  if (userId === session?.id) updateAppBadge(countUnconfirmedPushes(userId));
}

async function confirmPush(pushId) {
  if (!session) return;
  if (!state.pendingPushes) state.pendingPushes = [];
  const index = state.pendingPushes.findIndex(p => p.id === pushId && p.userId === session.id);
  if (index !== -1) {
    state.pendingPushes.splice(index, 1);
    await save();
    updateAppBadge(countUnconfirmedPushes(session.id));
    showToast('✅ Bestätigt', 'success');
    render();
  }
}

async function confirmAllPushes() {
  if (!session) return;
  if (!state.pendingPushes) state.pendingPushes = [];
  state.pendingPushes = state.pendingPushes.filter(p => p.userId !== session.id);
  await save();
  updateAppBadge(0);
  showToast('✅ Alle bestätigt', 'success');
  render();
}

function countUnconfirmedPushes(userId) {
  return state.pendingPushes?.filter(p => p.userId === userId && !p.confirmed).length || 0;
}

function renderPendingPushes() {
  if (!session || session.role !== 'parent') return '';
  const pushes = state.pendingPushes?.filter(p => p.userId === session.id && !p.confirmed) || [];
  if (pushes.length === 0) return '<div class="no-pushes">📭 Keine offenen Benachrichtigungen</div>';
  
  const sorted = [...pushes].sort((a,b) => (b.receivedAt||'').localeCompare(a.receivedAt||''));
  return `
    <div class="pushes-section">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <h3 style="margin:0;">🔔 Offene Benachrichtigungen</h3>
        <button class="btn secondary small" onclick="confirmAllPushes()">Alle bestätigen</button>
      </div>
      ${sorted.map(p => `
        <div class="push-card unread">
          <div class="push-header">
            <span class="push-date">${new Date(p.receivedAt).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>
            <span class="push-badge">Neu</span>

}

async function uploadImageToStorage(file, path) {
  try {
    showToast('🔄 Lade hoch...', 'info', 0);
    const compressed = await compressImage(file);
    const blob = await (await fetch(compressed)).blob();
    const ref = storage.ref().child(path);
    await ref.put(blob);
    const url = await ref.getDownloadURL();
    showToast('✅ Fertig', 'success');
    return url;
  } catch (e) {
    console.error(e);
    showToast('❌ Fehler', 'error');
    return null;
  }
}

async function deleteImageFromStorage(url) {
  if (!url?.includes('firebasestorage')) return;
  try {
    await storage.refFromURL(url).delete();
  } catch (e) { console.log('⚠️', e); }
}

function compressImage(file) {
  return new Promise((resolve, reject) => {
    if (!file.type.startsWith('image/')) { reject('Kein Bild'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        const max = 800;
        if (w > max || h > max) {
          if (w > h) { h = Math.round(h * max / w); w = max; }
          else { w = Math.round(w * max / h); h = max; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.8));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function repairPushTokens() {
  if (session?.role !== 'admin') { showToast('⛔ Nur Trainer', 'error'); return; }
  if (!state.pushTokens) state.pushTokens = {};
  Object.keys(state.pushTokens).forEach(k => {
    if (!Array.isArray(state.pushTokens[k])) {
      if (typeof state.pushTokens[k] === 'string') state.pushTokens[k] = [state.pushTokens[k]];
      else if (typeof state.pushTokens[k] === 'object') {
        state.pushTokens[k] = Object.values(state.pushTokens[k]).filter(v => typeof v === 'string' && (v.startsWith('f-')||v.startsWith('eqm')));
      } else state.pushTokens[k] = [];
    }
  });
  await save();
  showToast('✅ Tokens repariert', 'success');
}

async function sendPushNotification(userId, title, body, type = 'info') {
  pushCounter++;
  await saveIncomingPush(userId, title, body, type);
  if (!state.pushTokens?.[userId] || !Array.isArray(state.pushTokens[userId])) return;
  const tokens = state.pushTokens[userId];
  const now = Date.now();
  if (lastPush?.userId === userId && lastPush?.body === body && now - lastPush.time < 5000) return;
  lastPush = {userId, title, body, time: now};
  for (const t of tokens) {
    try {
      const at = await getAccessToken();
      if (at === 'dummy-token') { showToast(`🔧 Simulation für ${userId}`, 'info', 2000); continue; }
      const r = await fetch('https://fcm.googleapis.com/v1/projects/usv-staw-app/messages:send', {
        method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+at},
        body: JSON.stringify({ message: { token: t, notification: { title:'📱 USV St Andrä Wördern', body:'Neue Nachricht' }, data: { title, body, type, click_action:'OPEN_APP' }, android:{ priority:'high', notification:{click_action:'OPEN_APP'} }, apns:{payload:{aps:{sound:'default'}}} } })
      });
      if (!r.ok && (r.status === 404 || r.status === 400)) state.pushTokens[userId] = state.pushTokens[userId].filter(x => x !== t);
    } catch(e) { console.log('Push Fehler', e); }
  }
}

// ==================== HELPER ====================
function findPlayer(id) { return state.players?.find(p => p.id === id); }
function findUserForPlayer(pid) { return state.users?.find(u => u.playerId === pid); }
function visibleTeams() { let t = [state.teams.main]; if (state.teams.showSecond) t.push(state.teams.second); return t; }
function playersForCurrentTeam() {
  if (!state.players) return [];
  if (state.currentTeam === "ALLE") return state.players.filter(p => visibleTeams().includes(p.team));
  return state.players.filter(p => p.team === state.currentTeam);
}
function matchesForCurrentTeam() {
  if (!state.matches) return [];
  let m = state.matches.filter(m => visibleTeams().includes(m.team));
  if (state.currentTeam !== "ALLE") m = m.filter(m => m.team === state.currentTeam);
  return m.sort((a,b) => a.date.localeCompare(b.date));
}
function getTeamNumber(t) { let x = t?.match(/^U(\d+)$/i); return x ? parseInt(x[1]) : null; }
function isYouthTeam(t) { return t?.match(/^U(\d+)$/i) !== null; }
function getEligiblePlayersForMatch(m) {
  if (!state.players) return [];
  let mn = getTeamNumber(m.team);
  if (mn <= 8) return state.players.filter(p => p.team === m.team);
  return state.players.filter(p => { let pn = getTeamNumber(p.team); return pn && pn <= mn; });
}
function getVisibleMatchesForParent(pid) {
  let p = findPlayer(pid); if (!p) return [];
  let pn = getTeamNumber(p.team); if (!pn) return [];
  return state.matches?.filter(m => { let mn = getTeamNumber(m.team); return mn && mn >= pn; }).sort((a,b) => a.date.localeCompare(b.date)) || [];
}
function getUpcomingMatchesForParent(pid, l) {
  let p = findPlayer(pid); if (!p) return [];
  let now = new Date(), today = now.toISOString().split('T')[0];
  let all = getVisibleMatchesForParent(pid);
  let up = all.filter(m => {
    if (m.date > today) return true;
    if (m.date === today) {
      let [h,mi] = m.time.split(':').map(Number);
      return now < new Date().setHours(h+1, mi, 0);
    }
    return false;
  });
  if (l) up = up.slice(0, l);
  return up;
}
function isMatchPast(m) {
  let now = new Date(), today = now.toISOString().split('T')[0];
  if (m.date < today) return true;
  if (m.date === today) {
    let [h,mi] = m.time.split(':').map(Number);
    return now >= new Date().setHours(h+1, mi, 0);
  }
  return false;
}
function formatDate(d) {
  d = new Date(d);
  return { day: String(d.getDate()).padStart(2,"0"), mon: ["JAN","FEB","MÄR","APR","MAI","JUN","JUL","AUG","SEP","OKT","NOV","DEZ"][d.getMonth()] };
}
function countAttendance(m) {
  let pl = getEligiblePlayersForMatch(m);
  return {
    coming: pl.filter(p => m.attendance?.[p.id] === "coming").length,
    maybe: pl.filter(p => m.attendance?.[p.id] === "maybe").length,
    missing: pl.filter(p => m.attendance?.[p.id] === "missing").length,
    open: pl.filter(p => !m.attendance?.[p.id] || m.attendance[p.id] === "open").length,
    total: pl.length
  };
}
function calculatePlayerPercentage(pid) {
  let tr = state.trainings || [];
  if (tr.length === 0) return 0;
  let pts = 0;
  tr.forEach(t => { let s = t.attendance?.[pid]; if (s === "present") pts += 100; else if (s === "excused") pts += 25; });
  return Math.round(pts / tr.length);
}
function getTrainingHistory(pid) {
  return (state.trainings || []).filter(t => t.attendance?.[pid]).map(t => ({ date: t.date, status: t.attendance[pid] })).sort((a,b) => b.date.localeCompare(a.date));
}
function getGermanStatus(s) { return { coming:'Kommen', maybe:'Vielleicht', missing:'Fehlen', open:'Offen' }[s] || s; }
function getUpcomingBirthdays(c=3) {
  let t = new Date(), pl = playersForCurrentTeam();
  return pl.filter(p => p.birthday).map(p => {
    let b = new Date(p.birthday); b.setFullYear(t.getFullYear());
    if (b < t) b.setFullYear(t.getFullYear()+1);
    return { player: p, next: b };
  }).sort((a,b) => a.next - b.next).slice(0, c);
}
function getGoalRanking(team) {
  let r = {}; state.players?.filter(p => p.team === team && p.goals > 0).sort((a,b) => b.goals - a.goals).forEach((p,i) => r[p.id] = i+1);
  return r;
}
function getAssistRanking(team) {
  let r = {}; state.players?.filter(p => p.team === team && p.assists > 0).sort((a,b) => b.assists - a.assists).forEach((p,i) => r[p.id] = i+1);
  return r;
}
function getRankingBadge(r) { if (r===1) return '<span class="ranking-badge ranking-1">🥇</span>'; if (r===2) return '<span class="ranking-badge ranking-2">🥈</span>'; if (r===3) return '<span class="ranking-badge ranking-3">🥉</span>'; return `<span class="ranking-badge ranking-other">${r}</span>`; }
function calculateStars(v, t) {
  if (!v) return 0;
  if (t.better === "lower") {
    if (v <= t.target*0.9) return 5; if (v <= t.target*0.95) return 4; if (v <= t.target*1.0) return 3; if (v <= t.target*1.1) return 2; return 1;
  } else {
    if (v >= t.target*1.1) return 5; if (v >= t.target*1.05) return 4; if (v >= t.target*1.0) return 3; if (v >= t.target*0.95) return 2; return 1;
  }
}
function getStarsHtml(s) { let h = ''; for (let i=1;i<=5;i++) h += i<=s ? '<span class="star">★</span>' : '<span class="star-empty">☆</span>'; return h; }

function addMatch() {

  let d = document.getElementById("match-date").value;
  let ti = document.getElementById("match-time").value;
  let k = document.getElementById("match-kind").value;
  let l = document.getElementById("match-location").value;
  let m = document.getElementById("match-meeting").value.trim();
  let opp = [];
  if (isYouthTeam(team)) {
    let inp = document.getElementById("match-opponents")?.value.trim();
    if (inp) opp = inp.split(',').map(x => x.trim()).filter(x => x);
  }
  if (!t || !d || !ti) { showToast("Bitte ausfüllen", "warning"); return; }
  let months = ["JANUAR","FEBRUAR","MÄRZ","APRIL","MAI","JUNI","JULI","AUGUST","SEPTEMBER","OKTOBER","NOVEMBER","DEZEMBER"];
  let dt = new Date(d), month = months[dt.getMonth()] + " " + dt.getFullYear();
  let att = {};
  state.players?.filter(p => p.team === team).forEach(p => att[p.id] = "open");
  if (!state.matches) state.matches = [];
  state.matches.push({ id:"m"+Date.now(), team, date:d, month, time:ti, title:t, kind:k, location:l, meeting:m, opponents:opp, attendance:att, attendanceRequests:[], result:"", report:null });
  save();
  if (state.users && state.players) {
    let parents = state.users.filter(u => u.role === "parent"), mn = getTeamNumber(team);
    parents.forEach(pa => {
      if (!pa.playerId) return;
      let pl = findPlayer(pa.playerId); if (!pl) return;
      let pn = getTeamNumber(pl.team);
      let see = pn <= 8 ? mn >= pn : mn === pn;
      if (see) sendPushNotification(pa.id, "⚽ Neues Spiel", `${pl.name}: ${t} am ${d}`);
    });
  }
  showToast("✅ Spiel angelegt!", "success");
  document.getElementById("match-title").value = "";
  document.getElementById("match-date").value = "";
  document.getElementById("match-time").value = "";
  document.getElementById("match-meeting").value = "";
  if (document.getElementById("match-opponents")) document.getElementById("match-opponents").value = "";
}

}
function renderCalendar() {
  let isParent = session.role === "parent" || (session.role === "admin" && adminView === "trainerkind") || (session.role === "coach" && coachView === "coachkind");
  let pid = isParent ? (session.role==="parent"?session.playerId:session.childId) : null;
  let matches = isParent ? getVisibleMatchesForParent(pid) : matchesForCurrentTeam();
  let byMonth = {};
  matches.forEach(m => { if (!byMonth[m.month]) byMonth[m.month] = []; byMonth[m.month].push(m); });
  return `<div class="section">${Object.keys(byMonth).map(mo=>`<div class="month">${mo}</div>${byMonth[mo].map(m=>{let d=formatDate(m.date),c=countAttendance(m);return `<div class="match ${isMatchPast(m)?'past':''} ${state.expandedMatch===m.id?'expanded':''}" onclick="toggleMatchExpand('${m.id}')"><div class="datebox"><div class="day">${d.day}</div><div class="mon">${d.mon}</div></div><div class="info"><div class="badges"><span class="badge ${m.team===state.teams.main?'team1':'team2'}">${m.team}</span>${m.kind?`<span class="badge ${m.kind==='MEISTERSCHAFT'?'meisterschaft':m.kind==='TURNIER'?'turnier':m.kind==='TESTSPIEL'?'testspiel':'cup'}">${m.kind}</span>`:''}${m.location==='Heim'?'<span class="badge" style="background:var(--attendance-coming);">🏠 Heim</span>':'<span class="badge" style="background:var(--attendance-maybe);">✈️ Auswärts</span>'}</div><div class="name">${m.title}</div><div class="time">${m.time} · ${m.location}</div><div class="small mt-2">Treffpunkt: ${m.meeting}</div>${m.opponents?.length?`<div style="margin-top:8px;background:${m.location==='Heim'?'rgba(94,143,232,0.1)':'rgba(245,158,11,0.1)'};padding:8px;border-radius:8px;"><span style="font-weight:600;">${m.location==='Heim'?'🏠 Heimspiel gegen:':'✈️ Auswärtsspiel - Gegner:'}</span><div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">${m.opponents.map(o=>`<span style="background:${m.location==='Heim'?'var(--blue)':'var(--attendance-maybe)'};color:white;padding:2px 8px;border-radius:12px;font-size:11px;">${o}</span>`).join('')}</div></div>`:''}<div class="attendance-overview"><div class="attendance-item coming"><div class="count">${c.coming}</div><div class="label">Kommen</div></div><div class="attendance-item maybe"><div class="count">${c.maybe}</div><div class="label">Vielleicht</div></div><div class="attendance-item missing"><div class="count">${c.missing}</div><div class="label">Fehlen</div></div><div class="attendance-item open"><div class="count">${c.open}</div><div class="label">Offen</div></div></div><div class="small" style="text-align:center;">Gesamt: ${c.total}</div>${state.expandedMatch===m.id?`<div class="detailed-attendance">${getEligiblePlayersForMatch(m).sort((a,b)=>a.name.localeCompare(b.name)).map(p=>`<div class="detailed-row"><div><strong>${p.name}</strong> (${p.team})</div><div class="detailed-status ${(m.attendance?.[p.id]||'open')==='coming'?'status-coming':(m.attendance?.[p.id]||'open')==='maybe'?'status-maybe':(m.attendance?.[p.id]||'open')==='missing'?'status-missing':'status-open'}">${(m.attendance?.[p.id]||'open')==='coming'?'✓':(m.attendance?.[p.id]||'open')==='maybe'?'?':(m.attendance?.[p.id]||'open')==='missing'?'✗':'○'} ${getGermanStatus(m.attendance?.[p.id]||'open')}</div><div></div><div></div><div></div></div>`).join('')}</div>`:''}${session.role==="admin"?`<div style="display:flex;gap:8px;margin-top:12px;" onclick="event.stopPropagation()"><button class="btn secondary small" onclick="editMatch('${m.id}')">Bearbeiten</button><button class="btn warn small" onclick="deleteMatch('${m.id}')">Löschen</button></div>`:''}</div></div>`}).join('')}`).join('')}${matches.length===0?'<p class="small" style="text-align:center;">Keine Spiele</p>':''}</div>`;
}
function renderTraining() {
  let today = new Date().toISOString().split('T')[0];
  let pl = playersForCurrentTeam();
  return `<div class="section"><div class="card"><h3>🏋️ Training erfassen</h3><label>Datum</label><input id="training-date" type="date" value="${today}"><div style="margin:16px 0;padding:12px;background:#f0f7f2;border-radius:12px;"><div style="display:flex;gap:12px;justify-content:space-around;font-size:13px;"><span style="color:#2e9b58;">✓ anwesend = 100%</span><span style="color:#f3a43b;">F entschuldigt = 25%</span><span style="color:#d45d4a;">X fehlt = 0%</span></div></div>${pl.map(p=>`<div class="training-player"><span style="font-weight:600;">${p.name}</span><div class="training-options"><input type="radio" name="tr-${p.id}" value="present" id="${p.id}-present"><label for="${p.id}-present">✓</label><input type="radio" name="tr-${p.id}" value="excused" id="${p.id}-excused"><label for="${p.id}-excused">F</label><input type="radio" name="tr-${p.id}" value="missing" id="${p.id}-missing" checked><label for="${p.id}-missing">X</label></div></div>`).join('')}<div style="display:flex;gap:12px;margin-top:24px;"><button class="btn primary" style="flex:2;" onclick="finishTraining()">Training speichern</button><button class="btn secondary" style="flex:1;" onclick="setTodayForTraining()">Heute</button></div></div></div>`;
}
function renderTrainingHistory() {
  let tr = [...(state.trainings||[])].sort((a,b)=>b.date.localeCompare(a.date));
  return `<div class="section"><div class="card"><h3>📋 Trainingsübersicht</h3>${tr.length?tr.map(t=>{let pres=state.players?.filter(p=>t.attendance?.[p.id]==="present").map(p=>p.name).join(', ');let exc=state.players?.filter(p=>t.attendance?.[p.id]==="excused").map(p=>p.name).join(', ');let miss=state.players?.filter(p=>t.attendance?.[p.id]==="missing").map(p=>p.name).join(', ');return `<div style="margin-bottom:16px;padding:12px;background:#f5f9f6;border-radius:12px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div style="font-weight:600;">📅 ${t.date}</div>${session.role==="admin"?`<button class="btn danger small" onclick="deleteTraining('${t.id}')">🗑️</button>`:''}</div>${pres?`<div style="color:#2e9b58;">✓ Anwesend: ${pres}</div>`:''}${exc?`<div style="color:#f3a43b;">F Entschuldigt: ${exc}</div>`:''}${miss?`<div style="color:#d45d4a;">✗ Unentschuldigt: ${miss}</div>`:''}</div>`}).join(''):'<p class="small">Keine Trainings</p>'}</div></div>`;
}
function renderMatchReport() { return '<div class="section"><div class="card"><h3>📝 Spielberichte</h3><p class="small">Coming soon...</p></div></div>'; }
function renderTests() { return '<div class="section"><div class="card"><h3>📊 Tests</h3><p class="small">Coming soon...</p></div></div>'; }
function renderPlayers() { return '<div class="section"><div class="card"><h3>👥 Spieler</h3><p class="small">Coming soon...</p></div></div>'; }
function renderSplashConfig() { return '<div class="section"><div class="card"><h3>🎨 Splash</h3><p class="small">Coming soon...</p></div></div>'; }
function renderConfig() { return '<div class="section"><div class="card"><h3>⚙️ Konfiguration</h3><p class="small">Coming soon...</p></div></div>'; }
function renderMilestones(p) { return '<div class="section"><div class="card"><h3>🏆 Meilensteine</h3><p class="small">Coming soon...</p></div></div>'; }
function renderParentView() {
  let p = findPlayer(session.playerId); if (!p) return '<div class="section">Fehler</div>';
  let up = getUpcomingMatchesForParent(p.id);
  let hist = getTrainingHistory(p.id);
  let percent = calculatePlayerPercentage(p.id);
  let tests = p.tests || [];
  let last = tests.length ? tests.sort((a,b)=>b.date.localeCompare(a.date))[0] : null;
  let photo = p.photo ? `<div class="parent-photo"><img src="${p.photo}" alt="${p.name}"></div>` : '';
  let pushes = renderPendingPushes();
  let unread = countUnconfirmedPushes(session.id);
  return `
    <div class="section">
      <div class="tabs">
        <button class="pill ${parentView==='kind'?'active':'alt'}" onclick="setParentView('kind')">👤 Mein Kind</button>
        <button class="pill ${parentView==='pushes'?'active':'alt'}" onclick="setParentView('pushes')">🔔 Benachrichtigungen ${unread?`<span style="background:var(--red);color:white;border-radius:50%;padding:2px 6px;margin-left:4px;">${unread}</span>`:''}</button>
        <button class="pill ${parentView==='calendar'?'active':'alt'}" onclick="setParentView('calendar')">📅 Spiele</button>
        <button class="pill ${parentView==='tests'?'active':'alt'}" onclick="setParentView('tests')">📊 Tests</button>
        <button class="pill ${parentView==='history'?'active':'alt'}" onclick="setParentView('history')">📋 Training</button>
        <button class="pill ${parentView==='milestones'?'active':'alt'}" onclick="setParentView('milestones')">🏆 Meilensteine</button>
        <button class="pill ${parentView==='password'?'active':'alt'}" onclick="setParentView('password')">🔑 Passwort</button>
      </div>
      ${parentView === 'kind' ? `
        <div class="card"><h3>👤 ${p.name}</h3>${photo}<div class="current-stats"><div class="stat-card"><div class="value">${p.goals||0}</div><div class="label">Tore</div></div><div class="stat-card"><div class="value">${p.assists||0}</div><div class="label">Assists</div></div></div><h4 style="margin:20px 0 12px;">📅 Anstehende Spiele</h4>${up.length?up.map(m=>{let s=m.attendance?.[p.id]||'open';return `<div class="next-match-card ${s==='coming'?'coming':s==='maybe'?'maybe':s==='missing'?'missing':'open'}"><div class="small">${m.date} · ${m.time}</div><div class="title">${m.title}</div><div class="details">${m.location}</div>${m.opponents?.length?`<div style="margin-top:8px;"><span class="small">Gegner: ${m.opponents.join(' · ')}</span></div>`:''}<div class="small">${s==='coming'?'✓ Du kommst':s==='maybe'?'? Vielleicht':s==='missing'?'✗ Du fehlst':'○ Nicht abgestimmt'}</div><div class="small">Treffpunkt: ${m.meeting}</div></div>`}).join(''):'<div class="card" style="text-align:center;">Keine anstehenden Spiele</div>'}<div style="display:flex;gap:16px;margin:20px 0;"><div class="stat"><strong>${percent}%</strong><br><span class="small">Training</span></div><div class="stat"><strong>${up.length?Math.round(up.filter(m=>m.attendance?.[p.id]==='coming').length/up.length*100):0}%</strong><br><span class="small">Spiele</span></div></div><div><div class="listline">Geburtstag: ${p.birthday||'-'}</div><div class="listline">Position: ${p.position||'-'}</div><div class="listline">Trikot: ${p.jersey||'-'}</div></div>${last?`<h4 style="margin:20px 0 8px;">📊 Letzter Test (${last.date})</h4><div>${Object.entries(last.results).map(([tid,val])=>{let tc=state.testConfig?.find(t=>t.id===tid);return tc?`<div style="display:flex;justify-content:space-between;"><span>${tc.name}: <strong>${val} ${tc.unit}</strong></span><span>${getStarsHtml(calculateStars(val,tc))}</span></div>`:''}).join('')}</div>`:''}</div>
      ` : parentView === 'pushes' ? pushes :
         parentView === 'calendar' ? renderCalendar() :
         parentView === 'tests' ? '<div class="card"><h3>📊 Tests</h3><p class="small">Coming soon...</p></div>' :
         parentView === 'history' ? `<div class="card"><h3>📋 Training-History</h3>${hist.length?hist.map(h=>`<div class="history-item ${h.status==='present'?'history-present':h.status==='excused'?'history-excused':'history-missing'}"><span style="font-weight:600;">${h.date}</span> - ${h.status==='present'?'✓ anwesend':h.status==='excused'?'F entschuldigt':'✗ unentschuldigt'}</div>`).join(''):'<p class="small">Keine Trainings</p>'}</div>` :
         parentView === 'milestones' ? renderMilestones(p) :
         '<div class="card"><h3>🔑 Passwort ändern</h3><label>Altes PW</label><input id="old-password" type="password"><label>Neues PW</label><input id="new-password" type="password"><label>Wiederholen</label><input id="confirm-password" type="password"><button class="btn primary" style="width:100%;" onclick="changePassword()">Ändern</button></div>'}
    </div>
  `;
}
function setParentView(v) { parentView = v; render(); }
function renderTrainerKindView() { return ''; }
function renderCoachKindView() { return ''; }
function renderCoachView() { return '<div class="section"><div class="card"><h3>Co-Trainer</h3><p class="small">Coming soon...</p></div></div>'; }
function setAdminView(v) { adminView = v; render(); }
function setCoachView(v) { coachView = v; render(); }

function renderNav() {
  if (session.role === "parent") {
    let uc = countUnconfirmedPushes(session.id);
    let badge = uc ? `<span style="position:relative;top:-8px;right:-2px;background:var(--red);color:white;border-radius:50%;padding:2px 5px;font-size:10px;margin-left:2px;">${uc}</span>` : '';
    return `<div class="nav"><div class="nav-inner"><button class="${parentView==='kind'?'active':''}" onclick="setParentView('kind')">👤</button><button class="${parentView==='pushes'?'active':''}" onclick="setParentView('pushes')">🔔${badge}</button><button class="${parentView==='calendar'?'active':''}" onclick="setParentView('calendar')">📅</button><button class="${parentView==='tests'?'active':''}" onclick="setParentView('tests')">📊</button><button class="${parentView==='history'?'active':''}" onclick="setParentView('history')">📋</button><button class="${parentView==='milestones'?'active':''}" onclick="setParentView('milestones')">🏆</button><button class="${parentView==='password'?'active':''}" onclick="setParentView('password')">🔑</button><button onclick="logout()">🚪</button></div></div>`;
  }
  return '<div class="nav"><div class="nav-inner"><button onclick="logout()">🚪</button></div></div>';
}

function render() {
  document.getElementById('app').innerHTML = !session ? renderLogin() : renderHeader() + (session.role==="parent"?renderParentView():session.role==="coach"?renderCoachView():renderDashboard()) + renderNav();
}

async function startApp() {
  console.log('🚀 App startet...');
  await loadState();
  listenState();
  render();
  setTimeout(showSplashScreen, 100);
  let now = new Date(), next = new Date(); next.setHours(8,0,0,0);
  if (now > next) next.setDate(next.getDate()+1);
  setTimeout(() => { checkAndSendReminders(); setInterval(checkAndSendReminders, 86400000); }, next - now);
  setTimeout(() => { if (session) initPushNotifications(); }, 2000);
}

// Globale Funktionen
window.saveIncomingPush = saveIncomingPush;

window.approveAttendanceRequest = approveAttendanceRequest;

window.setTodayForTraining = setTodayForTraining;
window.setSelectedPlayer = setSelectedPlayer;
window.addPlayer = addPlayer;
window.deletePlayer = deletePlayer;
window.resetParentPassword = resetParentPassword;

window.handlePhotoUpload = handlePhotoUpload;
window.handleLogoUpload = handleLogoUpload;

window.handleSponsorUpload = handleSponsorUpload;
window.saveSponsorLogo = saveSponsorLogo;
window.clearSponsorLogo = clearSponsorLogo;

window.updateTrainerChild = updateTrainerChild;
window.deleteCoach = deleteCoach;
window.addTestConfig = addTestConfig;
window.deleteTestConfig = deleteTestConfig;
window.saveTestResults = saveTestResults;
window.deleteSingleTest = deleteSingleTest;

window.confirmDeleteAllPlayers = confirmDeleteAllPlayers;
window.setAdminView = setAdminView;
window.setCoachView = setCoachView;
window.setParentView = setParentView;
window.setTrainerKindView = setTrainerKindView;
window.setCoachKindView = setCoachKindView;
window.saveTeamConfig = saveTeamConfig;
window.setSelectedReportMatch = setSelectedReportMatch;
window.saveMatchReport = saveMatchReport;
window.deleteMatchReport = deleteMatchReport;
window.saveReminderDays = saveReminderDays;
window.saveSplashDuration = saveSplashDuration;
window.saveSplashEvent = saveSplashEvent;
window.handleSplashImageUpload = handleSplashImageUpload;
window.addCustomEvent = addCustomEvent;

startApp();
</script>
